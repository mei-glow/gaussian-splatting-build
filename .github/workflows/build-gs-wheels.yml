name: Build Gaussian Splatting Wheels

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show files
        run: |
          pwd
          ls -la
          echo "=== submodules ==="
          ls -la submodules || true
          echo "=== simple-knn ==="
          ls -la submodules/simple-knn || true
          echo "=== diff-gaussian-rasterization ==="
          ls -la submodules/diff-gaussian-rasterization || true
          echo "=== fused-ssim ==="
          ls -la submodules/fused-ssim || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CUDA 12.1 toolkit
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: "12.1.0"

      - name: Check CUDA
        run: |
          echo "CUDA_HOME=$CUDA_HOME"
          echo "CUDA_PATH=$CUDA_PATH"
          which nvcc
          nvcc --version

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel ninja packaging
          pip install torch==2.2.2+cu121 torchvision==0.17.2+cu121 --index-url https://download.pytorch.org/whl/cu121
          python - <<'PY'
          import torch
          print("torch:", torch.__version__)
          print("torch cuda:", torch.version.cuda)
          print("cuda available:", torch.cuda.is_available())
          print("torch file:", torch.__file__)
          PY

      - name: Build wheels with setup.py
        env:
          CUDA_HOME: /usr/local/cuda
          CUDA_PATH: /usr/local/cuda
          TORCH_CUDA_ARCH_LIST: "7.0;7.5;8.0;8.6;8.9"
          FORCE_CUDA: "1"
        run: |
          set -eux
          mkdir -p wheels

          echo "=== nvcc ==="
          which nvcc
          nvcc --version

          echo "=== torch check ==="
          python - <<'PY'
          import torch
          print("torch:", torch.__version__)
          print("torch cuda:", torch.version.cuda)
          print("torch file:", torch.__file__)
          PY

          echo "=== Build simple-knn ==="
          cd submodules/simple-knn
          python setup.py bdist_wheel
          cp dist/*.whl ../../wheels/
          cd ../..

          echo "=== Build diff-gaussian-rasterization ==="
          cd submodules/diff-gaussian-rasterization
          python setup.py bdist_wheel
          cp dist/*.whl ../../wheels/
          cd ../..

          echo "=== Build fused-ssim ==="
          cd submodules/fused-ssim
          python setup.py bdist_wheel
          cp dist/*.whl ../../wheels/
          cd ../..

          echo "=== Built wheels ==="
          ls -lh wheels

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: gs-wheels-py311-torch222-cu121
          path: wheels/*.whl
