name: Build Gaussian Splatting Wheels

on:
  workflow_dispatch:
    inputs:
      gsplat_version:
        description: "gsplat version pinned for torch 2.2.2+cu121"
        required: true
        default: "1.5.3"

jobs:
  build:
    runs-on: ubuntu-22.04
    container: ubuntu:20.04

    steps:
      - name: Install base tools in Ubuntu 20.04 container
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y \
            ca-certificates \
            curl \
            wget \
            git \
            gnupg \
            build-essential \
            ninja-build \
            bzip2

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Miniconda with Python 3.11
        run: |
          wget https://repo.anaconda.com/miniconda/Miniconda3-py311_24.5.0-0-Linux-x86_64.sh -O /tmp/miniconda.sh
          bash /tmp/miniconda.sh -b -p /opt/conda
          /opt/conda/bin/conda --version
          /opt/conda/bin/python --version

      - name: Install CUDA 12.1 in Ubuntu 20.04 container
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/cuda-keyring_1.1-1_all.deb
          dpkg -i cuda-keyring_1.1-1_all.deb
          apt-get update
          apt-get install -y \
            cuda-nvcc-12-1 \
            cuda-cudart-dev-12-1 \
            cuda-command-line-tools-12-1 \
            cuda-compiler-12-1

      - name: Install Python build deps
        run: |
          export PATH=/opt/conda/bin:$PATH

          python --version
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy<2" ninja packaging pybind11 rich jaxtyping typing_extensions
          python -m pip install torch==2.2.2+cu121 torchvision==0.17.2+cu121 --index-url https://download.pytorch.org/whl/cu121

          python - <<'PY'
          import torch
          print("torch:", torch.__version__)
          print("torch cuda:", torch.version.cuda)
          print("torch file:", torch.__file__)
          PY

      - name: Build INRIA wheels with setup.py
        env:
          CUDA_HOME: /usr/local/cuda-12.1
          CUDA_PATH: /usr/local/cuda-12.1
          TORCH_CUDA_ARCH_LIST: "7.0;7.5;8.0;8.6;8.9"
          FORCE_CUDA: "1"
          MAX_JOBS: "8"
        run: |
          set -eux

          export PATH=/opt/conda/bin:/usr/local/cuda-12.1/bin:$PATH
          export LD_LIBRARY_PATH=/usr/local/cuda-12.1/lib64:${LD_LIBRARY_PATH:-}

          mkdir -p wheels

          echo "=== GLIBC ==="
          ldd --version

          echo "=== Python ==="
          which python
          python --version

          echo "=== nvcc ==="
          which nvcc
          nvcc --version

          echo "=== torch check ==="
          python - <<'PY'
          import torch
          print("torch:", torch.__version__)
          print("torch cuda:", torch.version.cuda)
          print("torch file:", torch.__file__)
          PY

          echo "=== Build simple-knn ==="
          cd submodules/simple-knn
          python setup.py bdist_wheel
          cp dist/*.whl ../../wheels/
          cd ../..

          echo "=== Build diff-gaussian-rasterization ==="
          cd submodules/diff-gaussian-rasterization
          python setup.py bdist_wheel
          cp dist/*.whl ../../wheels/
          cd ../..

          echo "=== Build fused-ssim ==="
          cd submodules/fused-ssim
          python setup.py bdist_wheel
          cp dist/*.whl ../../wheels/
          cd ../..

      - name: Build gsplat wheel from pinned source
        env:
          CUDA_HOME: /usr/local/cuda-12.1
          CUDA_PATH: /usr/local/cuda-12.1
          TORCH_CUDA_ARCH_LIST: "8.6"
          FORCE_CUDA: "1"
          MAX_JOBS: "8"
        run: |
          set -eux

          export PATH=/opt/conda/bin:/usr/local/cuda-12.1/bin:$PATH
          export LD_LIBRARY_PATH=/usr/local/cuda-12.1/lib64:${LD_LIBRARY_PATH:-}

          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "numpy<2" ninja packaging pybind11 rich jaxtyping typing_extensions
          python -m pip install torch==2.2.2+cu121 torchvision==0.17.2+cu121 --index-url https://download.pytorch.org/whl/cu121

          python - <<'PY'
          import torch
          print("torch:", torch.__version__)
          print("torch cuda:", torch.version.cuda)
          print("torch file:", torch.__file__)
          PY

          rm -rf /tmp/gsplat-src
          git clone --recursive https://github.com/nerfstudio-project/gsplat.git /tmp/gsplat-src
          cd /tmp/gsplat-src

          git fetch --tags
          git checkout "v${{ github.event.inputs.gsplat_version }}"
          git submodule update --init --recursive

          echo "=== gsplat source ==="
          git rev-parse HEAD
          git describe --tags --always || true

          echo "=== nvcc ==="
          which nvcc
          nvcc --version

          echo "=== Build gsplat native wheel ==="
          python setup.py bdist_wheel

          cd -
          mkdir -p wheels
          cp /tmp/gsplat-src/dist/*.whl wheels/

          echo "=== gsplat wheels ==="
          ls -lh wheels/gsplat*.whl

          if ls wheels/gsplat-*py3-none-any.whl 1>/dev/null 2>&1; then
            echo "ERROR: built pure Python wheel, not CUDA/native wheel"
            exit 1
          fi

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: gs-wheels-plus-gsplat-py311-torch222-cu121-glibc231
          path: wheels/*.whl
